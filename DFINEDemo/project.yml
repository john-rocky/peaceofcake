name: DFINEDemo
options:
  bundleIdPrefix: com.dfine
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

targets:
  DFINEDemo:
    type: application
    platform: iOS
    sources:
      - DFINEDemo
      - path: dfine_n_coco.mlpackage
        buildPhase: sources
      - path: rfdetr_n_coco.mlpackage
        buildPhase: sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dfine.demo
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Select photos to run object detection"
      INFOPLIST_KEY_NSCameraUsageDescription: "Use camera for real-time object detection"
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGN_STYLE: Automatic
      SWIFT_VERSION: "5.9"
      TARGETED_DEVICE_FAMILY: "1"
